<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepAgent Session 浏览器</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f5f5f5;color:#333}
.app{display:flex;height:100vh}

/* Sidebar */
.sidebar{width:260px;background:#1a1a2e;color:#e0e0e0;display:flex;flex-direction:column;flex-shrink:0}
.sidebar h2{padding:20px 20px 16px;font-size:18px;color:#fff;border-bottom:1px solid #2a2a4a}
.nav-item{padding:10px 20px;cursor:pointer;font-size:14px;transition:background .2s;display:flex;align-items:center;gap:8px}
.nav-item:hover{background:#2a2a4a}
.nav-item.active{background:#3a3a6a;color:#fff;border-left:3px solid #1890ff}

/* Session list in sidebar */
.session-list{flex:1;overflow-y:auto;padding:8px 0}
.session-item{padding:12px 20px;cursor:pointer;border-bottom:1px solid #2a2a4a;transition:background .2s}
.session-item:hover{background:#2a2a4a}
.session-item.active{background:#3a3a6a}
.session-item .title{font-size:13px;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.session-item .meta{font-size:11px;color:#8888aa;margin-top:4px;display:flex;gap:8px}

/* Main */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}

/* Session header */
.session-header{background:#fff;padding:20px 24px;border-bottom:1px solid #e8e8e8;flex-shrink:0}
.session-header .top-row{display:flex;justify-content:space-between;align-items:center}
.session-header h1{font-size:18px}
.session-header .info{font-size:12px;color:#999;margin-top:4px}
.stats-row{display:flex;gap:20px;margin-top:16px}
.stat-card{text-align:center;background:#f5f5f5;border-radius:8px;padding:12px 20px;min-width:80px}
.stat-card .val{font-size:20px;font-weight:700;color:#1890ff}
.stat-card .lbl{font-size:11px;color:#999;margin-top:2px}

/* Messages */
.messages{flex:1;overflow-y:auto;padding:20px 24px}
.msg-group{margin-bottom:24px}
.msg-time{font-size:11px;color:#999;text-align:center;margin-bottom:12px}
.msg-pair{background:#fff;border-radius:12px;border:1px solid #e8e8e8;overflow:hidden;margin-bottom:16px}
.msg-user{padding:16px 20px;border-bottom:1px solid #f0f0f0;display:flex;gap:12px}
.msg-user .avatar{width:32px;height:32px;border-radius:50%;background:#4f46e5;color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-user .content{flex:1;font-size:14px;line-height:1.6}
.msg-agent{padding:16px 20px;display:flex;gap:12px}
.msg-agent .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,#e0e7ff,#c7d2fe);color:#4f46e5;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0}
.msg-agent .content{flex:1;font-size:14px;line-height:1.6;max-height:300px;overflow-y:auto}
.msg-agent .content table{width:100%;border-collapse:collapse;margin:8px 0;font-size:13px}
.msg-agent .content th,.msg-agent .content td{border:1px solid #e8e8e8;padding:6px 10px;text-align:left}
.msg-agent .content th{background:#f3f4f6;font-weight:600}
.msg-agent .content pre{background:#1e1b4b;color:#e0e7ff;padding:12px;border-radius:8px;overflow-x:auto;margin:8px 0}
.msg-agent .content code{background:#f3f4f6;padding:1px 5px;border-radius:4px;font-size:12px}
.msg-agent .content pre code{background:none;color:inherit;padding:0}

/* Trace summary bar */
.trace-bar{padding:10px 20px;background:#fafafa;border-top:1px solid #f0f0f0;display:flex;gap:8px;flex-wrap:wrap;align-items:center;font-size:11px}
.trace-badge{display:inline-flex;align-items:center;gap:3px;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:500}
.trace-badge.search{background:#e6f7ff;color:#1890ff}
.trace-badge.tool{background:#fff7e6;color:#fa8c16}
.trace-badge.token{background:#f6ffed;color:#52c41a}
.trace-badge.time{background:#f9f0ff;color:#722ed1}
.trace-badge.iter{background:#fff0f6;color:#eb2f96}
.trace-badge.cost{background:#f5f5f5;color:#666}
.trace-link{color:#1890ff;cursor:pointer;text-decoration:none;margin-left:auto}
.trace-link:hover{text-decoration:underline}

/* Compression event */
.compression-event{background:#fff;border:1px dashed #d9d9d9;border-radius:12px;padding:16px 20px;margin-bottom:16px}
.compression-event .title{font-size:12px;font-weight:600;color:#fa8c16;margin-bottom:8px}
.compression-event .detail{font-size:12px;color:#666;line-height:1.8}
.compression-event .detail .item{display:flex;align-items:center;gap:6px}

/* Empty */
.empty-state{text-align:center;padding:60px 20px;color:#999}
.empty-state .icon{font-size:48px;margin-bottom:12px}
.loading{text-align:center;padding:40px;color:#999}

/* Badge */
.badge{padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600}
.badge-success{background:#f6ffed;color:#52c41a}
.badge-error{background:#fff2f0;color:#ff4d4f}

@media(max-width:900px){.sidebar{width:200px}}
</style>
</head>
<body>
<div class="app">
  <div class="sidebar">
    <h2>💬 会话历史</h2>
    <div style="padding:8px 12px">
      <div class="nav-item" onclick="window.location.href='/'">🤖 返回对话</div>
      <div class="nav-item" onclick="window.location.href='/trace'">🔍 Trace Explorer</div>
    </div>
    <div class="session-list" id="session-list">
      <div class="loading">加载中...</div>
    </div>
  </div>
  <div class="main">
    <div class="session-header" id="session-header">
      <div class="top-row">
        <h1>选择一个会话</h1>
      </div>
    </div>
    <div class="messages" id="messages">
      <div class="empty-state"><div class="icon">👈</div><p>从左侧选择一个会话查看历史消息</p></div>
    </div>
  </div>
</div>

<script>
const API = '';

function esc(t) { if(!t)return''; const d=document.createElement('div'); d.textContent=String(t); return d.innerHTML; }
function fmtDur(ms) { if(!ms)return'0ms'; if(ms>=60000)return(ms/60000).toFixed(1)+'min'; if(ms>=1000)return(ms/1000).toFixed(1)+'s'; return ms+'ms'; }
function fmtTokens(n) { if(!n)return'0'; if(n>=1e6)return(n/1e6).toFixed(1)+'M'; if(n>=1e3)return(n/1e3).toFixed(1)+'K'; return String(n); }
function fmtTime(ts) {
  if(!ts) return '—';
  const d = new Date(typeof ts==='number' && ts>1e12 ? ts : ts*1000);
  return d.toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
function fmtCost(c) { return c >= 1 ? '¥'+c.toFixed(0) : '¥'+c.toFixed(2); }
function renderMd(text) { return typeof marked!=='undefined' ? marked.parse(text) : esc(text).replace(/\n/g,'<br>'); }

// Load trace list as sessions (grouped by thread_id)
async function loadSessions() {
  const el = document.getElementById('session-list');
  try {
    const res = await fetch(API + '/api/traces?limit=200');
    const data = await res.json();
    const traces = data.traces || [];

    // Group by thread_id
    const groups = {};
    traces.forEach(t => {
      if (!groups[t.thread_id]) {
        groups[t.thread_id] = { thread_id: t.thread_id, traces: [], total_tokens: 0, total_cost: 0, agent_name: t.agent_name || 'Agent' };
      }
      groups[t.thread_id].traces.push(t);
      groups[t.thread_id].total_tokens += t.total_tokens || 0;
    });

    const sessions = Object.values(groups).sort((a,b) => {
      const aTime = Math.max(...a.traces.map(t=>t.start_time||0));
      const bTime = Math.max(...b.traces.map(t=>t.start_time||0));
      return bTime - aTime;
    });

    if (!sessions.length) { el.innerHTML = '<div style="padding:20px;text-align:center;color:#8888aa">暂无会话</div>'; return; }

    el.innerHTML = sessions.map(s => {
      const lastTrace = s.traces[0];
      const firstInput = s.traces[s.traces.length-1]?.user_input || '新对话';
      return `<div class="session-item" data-thread="${s.thread_id}" onclick="loadSession('${s.thread_id}')">
        <div class="title">${esc(firstInput.slice(0,30))}${firstInput.length>30?'...':''}</div>
        <div class="meta">
          <span>${s.traces.length} 条</span>
          <span>${fmtTokens(s.total_tokens)}</span>
          <span>${fmtTime(lastTrace.start_time)}</span>
        </div>
      </div>`;
    }).join('');
  } catch(e) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:#ff4d4f">加载失败</div>';
  }
}

async function loadSession(threadId) {
  // Highlight sidebar
  document.querySelectorAll('.session-item').forEach(el => el.classList.toggle('active', el.dataset.thread === threadId));

  const headerEl = document.getElementById('session-header');
  const msgEl = document.getElementById('messages');
  msgEl.innerHTML = '<div class="loading">加载中...</div>';

  try {
    const res = await fetch(API + '/api/traces?limit=200');
    const data = await res.json();
    const traces = (data.traces || []).filter(t => t.thread_id === threadId);

    if (!traces.length) { msgEl.innerHTML = '<div class="empty-state">该会话暂无消息</div>'; return; }

    // Sort by time ASC
    traces.sort((a,b) => (a.start_time||0) - (b.start_time||0));

    const totalTokens = traces.reduce((s,t) => s + (t.total_tokens||0), 0);
    const totalDuration = traces.reduce((s,t) => s + (t.total_duration_ms||0), 0);
    const firstTime = traces[0].start_time;
    const lastTime = traces[traces.length-1].start_time;

    headerEl.innerHTML = `
      <div class="top-row">
        <div>
          <h1>Session: ${esc(threadId)}</h1>
          <div class="info">${traces[0].agent_name||'Agent'} · 创建: ${fmtTime(firstTime)} · 最后活跃: ${fmtTime(lastTime)}</div>
        </div>
      </div>
      <div class="stats-row">
        <div class="stat-card"><div class="val">${traces.length}</div><div class="lbl">消息</div></div>
        <div class="stat-card"><div class="val">${fmtTokens(totalTokens)}</div><div class="lbl">Token</div></div>
        <div class="stat-card"><div class="val">${fmtDur(totalDuration)}</div><div class="lbl">总耗时</div></div>
      </div>`;

    // Render messages
    let html = '';
    for (const t of traces) {
      html += `<div class="msg-group">
        <div class="msg-time">${fmtTime(t.start_time)}</div>
        <div class="msg-pair">
          <div class="msg-user">
            <div class="avatar">👤</div>
            <div class="content">${esc(t.user_input || '(空)')}</div>
          </div>
          <div class="msg-agent">
            <div class="avatar">🤖</div>
            <div class="content">${renderMd(t.agent_output || '(无回复)')}</div>
          </div>
          <div class="trace-bar">
            <span class="trace-badge token">🔤 ${fmtTokens(t.total_tokens)}</span>
            <span class="trace-badge time">⏱ ${fmtDur(t.total_duration_ms)}</span>
            <span class="trace-badge iter">🔄 ${t.iteration_count} iter</span>
            <span class="trace-badge tool">🔧 ${t.tool_count} tools</span>
            <span class="badge badge-${t.status}">${t.status}</span>
            <a class="trace-link" href="/trace" onclick="event.preventDefault();window.open('/trace#'+t.trace_id)">查看 Trace →</a>
          </div>
        </div>
      </div>`;
    }
    msgEl.innerHTML = html;
  } catch(e) {
    msgEl.innerHTML = '<div class="empty-state" style="color:#ff4d4f">加载失败: '+e.message+'</div>';
  }
}

// Init
loadSessions();
</script>
</body>
</html>
