<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DeepAgent CRM 助手</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;height:100vh;display:flex;flex-direction:column}

/* 顶部导航 */
.topbar{background:#1a1a2e;color:#fff;padding:10px 24px;display:flex;align-items:center;gap:16px}
.topbar h1{font-size:16px;font-weight:600}
.topbar .tabs{display:flex;gap:4px;margin-left:32px}
.topbar .tab{padding:6px 16px;border-radius:6px;font-size:13px;cursor:pointer;color:#aaa}
.topbar .tab.active{background:rgba(255,255,255,.15);color:#fff}
.topbar .tab:hover{color:#fff}

/* 主体 */
.main{flex:1;display:flex;overflow:hidden}

/* 左侧对话 */
.chat-panel{flex:1;display:flex;flex-direction:column;background:#fff}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px}
.msg{margin-bottom:14px;display:flex;gap:10px}
.msg.user{flex-direction:row-reverse}
.msg-bubble{max-width:72%;padding:10px 14px;border-radius:10px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word}
.msg.user .msg-bubble{background:#1a1a2e;color:#fff;border-bottom-right-radius:3px}
.msg.assistant .msg-bubble{background:#f0f0f5;color:#333;border-bottom-left-radius:3px}
.msg-avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;flex-shrink:0}
.msg.user .msg-avatar{background:#1a1a2e;color:#fff}
.msg.assistant .msg-avatar{background:#e8e8f0;color:#555}
.tool-badge{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;margin:2px 0;font-family:monospace}
.tool-badge.start{background:#fff3e0;color:#e65100}
.tool-badge.end{background:#e8f5e9;color:#2e7d32}
.tool-badge.llm{background:#e3f2fd;color:#1565c0}
.quick-bar{padding:8px 20px;display:flex;gap:6px;flex-wrap:wrap;border-top:1px solid #eee}
.quick-btn{background:#f5f5f5;border:1px solid #ddd;border-radius:14px;padding:4px 12px;font-size:11px;cursor:pointer;color:#555}
.quick-btn:hover{background:#e8e8f0;border-color:#1a1a2e;color:#1a1a2e}
.chat-input{padding:12px 20px;border-top:1px solid #e8e8e8;display:flex;gap:10px}
.chat-input textarea{flex:1;border:1px solid #d0d0d0;border-radius:8px;padding:8px 12px;font-size:13px;resize:none;height:40px;outline:none;font-family:inherit}
.chat-input textarea:focus{border-color:#1a1a2e}
.chat-input button{background:#1a1a2e;color:#fff;border:none;border-radius:8px;padding:0 20px;font-size:13px;cursor:pointer}
.chat-input button:disabled{background:#999;cursor:not-allowed}

/* 右侧 Trace 面板 */
.trace-panel{width:420px;border-left:1px solid #e0e0e0;display:flex;flex-direction:column;background:#fafafa}
.trace-tabs{display:flex;border-bottom:1px solid #e0e0e0}
.trace-tab{flex:1;padding:10px;text-align:center;font-size:12px;cursor:pointer;color:#888;border-bottom:2px solid transparent}
.trace-tab.active{color:#1a1a2e;border-bottom-color:#1a1a2e;font-weight:600}
.trace-content{flex:1;overflow-y:auto;padding:12px}

/* Trace Explorer */
.trace-list-item{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:10px;margin-bottom:8px;cursor:pointer;font-size:12px}
.trace-list-item:hover{border-color:#1a1a2e}
.trace-list-item .tl-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.trace-list-item .tl-input{color:#333;font-weight:500}
.trace-list-item .tl-status{padding:2px 6px;border-radius:3px;font-size:10px}
.trace-list-item .tl-status.success{background:#e8f5e9;color:#2e7d32}
.trace-list-item .tl-status.error{background:#ffebee;color:#c62828}
.trace-list-item .tl-status.running{background:#fff3e0;color:#e65100}
.trace-list-item .tl-metrics{display:flex;gap:12px;color:#888;font-size:11px}

/* Trace 详情 — 时间线 */
.trace-detail-header{background:#fff;border:1px solid #e8e8e8;border-radius:8px;padding:12px;margin-bottom:10px}
.trace-detail-header h3{font-size:13px;margin-bottom:8px}
.trace-detail-metrics{display:flex;gap:16px;font-size:11px;color:#666}
.trace-detail-metrics .metric{text-align:center}
.trace-detail-metrics .metric .val{font-size:16px;font-weight:700;color:#1a1a2e}

.timeline{position:relative}
.timeline-bar{position:relative;height:8px;background:#e8e8e8;border-radius:4px;margin:12px 0 8px}
.timeline-fill{position:absolute;height:100%;border-radius:4px;top:0}

.span-item{background:#fff;border:1px solid #e8e8e8;border-radius:6px;padding:8px 10px;margin-bottom:6px;font-size:11px;display:flex;align-items:center;gap:8px}
.span-item .span-icon{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0}
.span-item .span-icon.llm{background:#e3f2fd;color:#1565c0}
.span-item .span-icon.tool{background:#fff3e0;color:#e65100}
.span-item .span-icon.memory{background:#f3e5f5;color:#7b1fa2}
.span-item .span-icon.request{background:#e8f5e9;color:#2e7d32}
.span-item .span-icon.error{background:#ffebee;color:#c62828}
.span-item .span-icon.compress{background:#e0f7fa;color:#00838f}
.span-item .span-icon.skill{background:#fce4ec;color:#c62828}
.span-item .span-body{flex:1;min-width:0}
.span-item .span-name{font-weight:600;color:#333}
.span-item .span-meta{color:#888;font-size:10px;margin-top:2px}
.span-item .span-dur{font-size:11px;color:#1a1a2e;font-weight:600;white-space:nowrap}
.span-item .span-data{font-family:monospace;font-size:10px;color:#666;margin-top:4px;max-height:60px;overflow:hidden;word-break:break-all}
.span-item.expanded .span-data{max-height:none}
.span-item:hover{border-color:#1a1a2e;cursor:pointer}

.empty-state{text-align:center;color:#aaa;padding:40px;font-size:13px}

@media(max-width:900px){.trace-panel{display:none}}
</style>
</head>
<body>

<div class="topbar">
  <h1>🤖 DeepAgent</h1>
  <div class="tabs">
    <div class="tab active" onclick="switchView('chat')">💬 对话</div>
    <div class="tab" onclick="switchView('explorer')">🔍 Trace Explorer</div>
  </div>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="chat-messages" id="messages">
      <div class="msg assistant"><div class="msg-avatar">🤖</div>
        <div class="msg-bubble">你好！我是 CRM 智能业务助手。可以帮你查询客户、商机数据，分析 Pipeline，校验配置等。</div></div>
    </div>
    <div class="quick-bar">
      <button class="quick-btn" onclick="sendQuick('系统中有多少个客户？')">📊 客户数量</button>
      <button class="quick-btn" onclick="sendQuick('帮我查一下活跃客户，按营收排序')">🏢 活跃客户</button>
      <button class="quick-btn" onclick="sendQuick('帮我分析商机 Pipeline，按阶段统计')">📈 Pipeline</button>
      <button class="quick-btn" onclick="sendQuick('帮我校验商机的元数据配置')">🔍 配置校验</button>
    </div>
    <div class="chat-input">
      <textarea id="input" placeholder="输入消息... (Enter 发送)" rows="1"
                onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
      <button id="sendBtn" onclick="sendMessage()">发送</button>
    </div>
  </div>

  <div class="trace-panel">
    <div class="trace-tabs">
      <div class="trace-tab active" id="tabLive" onclick="showTraceTab('live')">⚡ 实时链路</div>
      <div class="trace-tab" id="tabExplorer" onclick="showTraceTab('explorer')">📋 Trace 列表</div>
      <div class="trace-tab" id="tabDetail" onclick="showTraceTab('detail')">🔍 详情</div>
    </div>
    <div class="trace-content" id="traceContent">
      <div class="empty-state" id="liveTrace">等待对话开始...</div>
      <div style="display:none" id="explorerTrace"></div>
      <div style="display:none" id="detailTrace"></div>
    </div>
  </div>
</div>

<script>
const API = '';
let threadId = crypto.randomUUID().slice(0,12);
let history = [];
let currentTraceId = null;

// ── Tab 切换 ──
function showTraceTab(tab) {
  document.querySelectorAll('.trace-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
  ['live','explorer','detail'].forEach(t => {
    document.getElementById(t+'Trace').style.display = t===tab ? 'block' : 'none';
  });
  if (tab === 'explorer') loadTraceList();
}

function switchView(view) {
  document.querySelectorAll('.topbar .tab').forEach(t => t.classList.remove('active'));
  if (view === 'explorer') {
    document.querySelectorAll('.topbar .tab')[1].classList.add('active');
    showTraceTab('explorer');
  } else {
    document.querySelectorAll('.topbar .tab')[0].classList.add('active');
    showTraceTab('live');
  }
}

// ── 实时 Trace ──
function addLiveSpan(type, name, data, durationMs) {
  const el = document.getElementById('liveTrace');
  if (el.querySelector('.empty-state')) el.innerHTML = '';

  const icons = {
    'llm_start': ['llm','🧠'], 'llm_end': ['llm','🧠'], 'tool_start': ['tool','🔧'],
    'tool_end': ['tool','✅'], 'token': ['llm','💬'], 'done': ['request','🏁'],
    'error': ['error','❌'],
  };
  const [cls, icon] = icons[type] || ['request','📋'];
  const dur = durationMs ? `<span class="span-dur">${durationMs}ms</span>` : '';
  const dataStr = data ? `<div class="span-data">${esc(JSON.stringify(data).slice(0,200))}</div>` : '';

  el.insertAdjacentHTML('afterbegin',
    `<div class="span-item"><div class="span-icon ${cls}">${icon}</div>
     <div class="span-body"><div class="span-name">${esc(name)}</div>${dataStr}</div>${dur}</div>`);
}

// ── Trace Explorer ──
async function loadTraceList() {
  const el = document.getElementById('explorerTrace');
  el.innerHTML = '<div class="empty-state">加载中...</div>';
  try {
    const resp = await fetch(API + '/api/traces?limit=30');
    const data = await resp.json();
    if (!data.traces.length) { el.innerHTML = '<div class="empty-state">暂无 Trace</div>'; return; }
    el.innerHTML = data.traces.map(t => `
      <div class="trace-list-item" onclick="loadTraceDetail('${t.trace_id}')">
        <div class="tl-header">
          <span class="tl-input">${esc(t.user_input)}</span>
          <span class="tl-status ${t.status}">${t.status}</span>
        </div>
        <div class="tl-metrics">
          <span>⏱ ${t.total_duration_ms}ms</span>
          <span>🔤 ${t.total_tokens}</span>
          <span>🔄 ${t.iteration_count} iter</span>
          <span>🔧 ${t.tool_count} tools</span>
          <span>📊 ${t.span_count} spans</span>
        </div>
      </div>
    `).join('');
  } catch(e) { el.innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`; }
}

// ── Trace 详情 ──
async function loadTraceDetail(traceId) {
  showTraceTab('detail');
  const el = document.getElementById('detailTrace');
  el.innerHTML = '<div class="empty-state">加载中...</div>';
  try {
    const resp = await fetch(API + `/api/traces/${traceId}`);
    const data = await resp.json();
    const t = data.trace;
    const tl = data.timeline;

    let html = `<div class="trace-detail-header">
      <h3>Trace: ${t.trace_id}</h3>
      <div style="font-size:11px;color:#888;margin:4px 0">Thread: ${t.thread_id} | ${t.agent_name} | ${t.model}</div>
      <div class="trace-detail-metrics">
        <div class="metric"><div class="val">${Math.round(t.total_duration_ms)}ms</div>总耗时</div>
        <div class="metric"><div class="val">${t.total_tokens}</div>Token</div>
        <div class="metric"><div class="val">${t.iteration_count}</div>迭代</div>
        <div class="metric"><div class="val">${t.tool_count}</div>工具</div>
        <div class="metric"><div class="val">${t.spans.length}</div>Spans</div>
      </div>
    </div>`;

    // 时间线条
    if (t.total_duration_ms > 0) {
      html += '<div class="timeline-bar">';
      for (const s of tl) {
        const left = (s.offset_ms / t.total_duration_ms * 100).toFixed(1);
        const width = Math.max((s.duration_ms / t.total_duration_ms * 100), 1).toFixed(1);
        const colors = {llm_call:'#1565c0',tool_call:'#e65100',request:'#2e7d32',response:'#2e7d32',
                        memory_retrieve:'#7b1fa2',compression:'#00838f',error:'#c62828'};
        const color = colors[s.type] || '#888';
        html += `<div class="timeline-fill" style="left:${left}%;width:${width}%;background:${color}" title="${s.name} ${s.duration_ms}ms"></div>`;
      }
      html += '</div>';
    }

    // Span 列表
    const spanIcons = {
      request:['request','👤'], response:['request','🤖'], llm_call:['llm','🧠'],
      tool_call:['tool','🔧'], memory_retrieve:['memory','🧠'], memory_extract:['memory','💾'],
      compression:['compress','📦'], skill_select:['skill','🎯'], skill_execute:['skill','⚡'],
      error:['error','❌'], before_agent:['request','📋'], after_agent:['request','📋'],
    };

    for (const s of t.spans) {
      const [cls, icon] = spanIcons[s.type] || ['request','📋'];
      const dur = s.duration_ms > 0 ? `<span class="span-dur">${Math.round(s.duration_ms)}ms</span>` : '';
      const inputStr = s.input && Object.keys(s.input).length ? `<div class="span-data">IN: ${esc(JSON.stringify(s.input).slice(0,200))}</div>` : '';
      const outputStr = s.output && Object.keys(s.output).length ? `<div class="span-data">OUT: ${esc(JSON.stringify(s.output).slice(0,200))}</div>` : '';
      const metaStr = s.metadata && Object.keys(s.metadata).length ? `<div class="span-meta">${Object.entries(s.metadata).map(([k,v])=>k+':'+v).join(' | ')}</div>` : '';
      html += `<div class="span-item" onclick="this.classList.toggle('expanded')">
        <div class="span-icon ${cls}">${icon}</div>
        <div class="span-body"><div class="span-name">${esc(s.name)}</div>${metaStr}${inputStr}${outputStr}</div>${dur}
      </div>`;
    }

    // 用户输入和 Agent 输出
    html += `<div style="margin-top:12px;padding:10px;background:#fff;border:1px solid #e8e8e8;border-radius:8px;font-size:12px">
      <div style="margin-bottom:8px"><b>👤 用户:</b> ${esc(t.user_input)}</div>
      <div><b>🤖 Agent:</b> ${esc(t.agent_output)}</div>
    </div>`;

    el.innerHTML = html;
  } catch(e) { el.innerHTML = `<div class="empty-state">加载失败: ${e.message}</div>`; }
}

// ── 对话 ──
function addMessage(role, content) {
  const div = document.getElementById('messages');
  const avatar = role==='user'?'👤':'🤖';
  div.insertAdjacentHTML('beforeend',
    `<div class="msg ${role}"><div class="msg-avatar">${avatar}</div><div class="msg-bubble">${esc(content)}</div></div>`);
  div.scrollTop = div.scrollHeight;
}

function addToolBadge(text, cls) {
  const div = document.getElementById('messages');
  div.insertAdjacentHTML('beforeend', `<div style="padding:0 20px 2px 48px"><span class="tool-badge ${cls}">${esc(text)}</span></div>`);
  div.scrollTop = div.scrollHeight;
}

function sendQuick(text) { document.getElementById('input').value = text; sendMessage(); }

async function sendMessage() {
  const input = document.getElementById('input');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;
  input.value = ''; btn.disabled = true;
  addMessage('user', text);
  history.push({role:'user',content:text});

  // 重置实时 trace
  document.getElementById('liveTrace').innerHTML = '';
  showTraceTab('live');

  const messagesDiv = document.getElementById('messages');
  const msgDiv = document.createElement('div');
  msgDiv.className = 'msg assistant';
  msgDiv.innerHTML = '<div class="msg-avatar">🤖</div><div class="msg-bubble" id="streaming">思考中...</div>';
  messagesDiv.appendChild(msgDiv);

  let fullContent = '';
  try {
    const resp = await fetch(API+'/api/chat', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({message:text, thread_id:threadId, history:history.slice(0,-1)}),
    });
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, {stream:true});
      const lines = buffer.split('\n'); buffer = lines.pop()||'';
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(line.slice(6));
          if (d.type==='token') {
            fullContent += d.content;
            document.getElementById('streaming').textContent = fullContent;
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
          } else if (d.type==='tool_start') {
            addToolBadge(`⚡ ${d.tool_name}`, 'start');
            addLiveSpan('tool_start', `tool:${d.tool_name}`, {input:d.input});
          } else if (d.type==='tool_end') {
            addToolBadge(`✅ ${d.tool_name} (${d.duration_ms||0}ms)`, 'end');
            addLiveSpan('tool_end', `tool:${d.tool_name}`, {output:(d.output||'').slice(0,100)}, d.duration_ms);
          } else if (d.type==='llm_start') {
            addToolBadge(`🧠 LLM iter ${d.iteration}`, 'llm');
            addLiveSpan('llm_start', `llm_call iter ${d.iteration}`);
          } else if (d.type==='llm_end') {
            addLiveSpan('llm_end', `llm_call 完成`, d.tokens, d.duration_ms);
          } else if (d.type==='error') {
            fullContent += '\n❌ '+d.content;
            document.getElementById('streaming').textContent = fullContent;
            addLiveSpan('error', 'error', {error:d.content});
          } else if (d.type==='done') {
            currentTraceId = d.trace_id;
            addLiveSpan('done', '完成', {trace_id:d.trace_id});
          }
        } catch(e){}
      }
    }
  } catch(err) {
    fullContent = '❌ 请求失败: '+err.message;
    document.getElementById('streaming').textContent = fullContent;
  }

  const streamEl = document.getElementById('streaming');
  if (streamEl) streamEl.removeAttribute('id');
  history.push({role:'assistant',content:fullContent});
  btn.disabled = false; input.focus();
}

function esc(t){const d=document.createElement('div');d.textContent=t;return d.innerHTML}
</script>
</body>
</html>
